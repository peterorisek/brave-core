substitutions:
  - description: |
      Expose new_tab_button() and GetComboButton() to Brave

      `HorizontalTabStripRegionView` now aliases `HorizontalTabStripRegionViewOld`,
      so members are injected into that class. `GetComboButton()` restores an
      accessor upstream removed but Brave still relies on.
    regex:
      re_pattern: '(  ~HorizontalTabStripRegionViewOld\(\) override;)'
      replace: |-
        \1
          views::Button* new_tab_button() { return new_tab_button_; }
          TabStripComboButton* GetComboButton() { return combo_button_; }

  - description: |
      Friend the Brave tab strip classes and vertical tab strip test

      Grants the Brave tab strip subclasses and the vertical tab strip browser
      test access to private members.
    regex:
      re_pattern: '(class HorizontalTabStripRegionViewOld.*? private:\n)'
      re_flags: [DOTALL]
      replace: |
        \1  friend class BraveVerticalTabStripRegionView;
          friend class BraveTabStrip;
          friend class BraveHorizontalTabStripRegionView;
          FRIEND_TEST_ALL_PREFIXES(VerticalTabStripBrowserTest, MinHeight);

  - description: |
      Make UpdateTabStripMargin overridable

      BraveHorizontalTabStripRegionView overrides this method.
    make_virtual:
      class_name: HorizontalTabStripRegionViewOld
      method_name: UpdateTabStripMargin
